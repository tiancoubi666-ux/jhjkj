<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>经典贪吃蛇</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #1a1a1a;
        }

        .game-title {
            color: #fff;
            font-size: 32px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #4caf50;
        }

        #gameCanvas {
            border: 3px solid #4caf50;
            border-radius: 5px;
            background-color: #000;
        }

        .score-panel {
            color: #fff;
            font-size: 20px;
            margin-top: 15px;
            display: flex;
            gap: 30px;
        }

        .tips {
            color: #ccc;
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1 class="game-title">🐍 经典贪吃蛇</h1>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="score-panel">
        <span>当前分数：<span id="score">0</span></span>
        <span>最高分数：<span id="maxScore">0</span></span>
    </div>
    <p class="tips">操作说明：↑↓←→ 控制方向 | 空格 暂停/继续</p>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score");
        const maxScoreEl = document.getElementById("maxScore");

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        // 蛇初始位置 + 默认向右自动开局
        let snake = [{ x: 5, y: 10 }];
        let dx = 1;  
        let dy = 0;

        let food = { x: 15, y: 10 };
        let score = 0;
        let maxScore = localStorage.getItem("maxScore") || 0;
        maxScoreEl.textContent = maxScore;

        let gameLoop;
        let isPaused = false;

        document.addEventListener("keydown", changeDirection);

        // 启动游戏
        function startGame() {
            generateFood();
            drawGame();
            gameLoop = setInterval(updateGame, 120);
        }

        function updateGame() {
            if (isPaused) return;

            if (checkCollision()) {
                clearInterval(gameLoop);
                alert(`游戏结束！最终得分：${score}`);
                return;
            }

            // 吃食物
            if (snake[0].x === food.x && snake[0].y === food.y) {
                score += 10;
                scoreEl.textContent = score;
                if (score > maxScore) {
                    maxScore = score;
                    maxScoreEl.textContent = maxScore;
                    localStorage.setItem("maxScore", maxScore);
                }
                generateFood();
            } else {
                snake.pop();
            }

            // 移动蛇头
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head);

            drawGame();
        }

        function drawGame() {
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 画蛇
            snake.forEach((segment, index) => {
                ctx.fillStyle = index === 0 ? "#4caf50" : "#81c784";
                ctx.fillRect(segment.x * gridSize, segment.y * gridSize, gridSize - 2, gridSize - 2);
            });

            // 画食物
            ctx.fillStyle = "#f44336";
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
        }

        // 随机食物
        function generateFood() {
            let newFood;
            while (!newFood || snake.some(s => s.x === newFood.x && s.y === newFood.y)) {
                newFood = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            }
            food = newFood;
        }

        // 按键控制
        function changeDirection(e) {
            if (e.code === "Space") {
                isPaused = !isPaused;
                return;
            }

            const up = e.code === "ArrowUp";
            const down = e.code === "ArrowDown";
            const left = e.code === "ArrowLeft";
            const right = e.code === "ArrowRight";

            const goingUp = dy === -1;
            const goingDown = dy === 1;
            const goingLeft = dx === -1;
            const goingRight = dx === 1;

            if (up && !goingDown) { dx = 0; dy = -1; }
            if (down && !goingUp) { dx = 0; dy = 1; }
            if (left && !goingRight) { dx = -1; dy = 0; }
            if (right && !goingLeft) { dx = 1; dy = 0; }
        }

        // 碰撞检测
        function checkCollision() {
            // 撞墙
            if (snake[0].x < 0 || snake[0].x >= tileCount ||
                snake[0].y < 0 || snake[0].y >= tileCount) {
                return true;
            }
            // 撞自己
            for (let i = 1; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) {
                    return true;
                }
            }
            return false;
        }

        // 页面加载完直接开局
        startGame();
    </script>
</body>
</html>
